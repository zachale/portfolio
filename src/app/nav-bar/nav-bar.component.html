<div class="px-4">
  <div
    fxLayout="row"
    class="glass-nav-bar p-4"
    fxLayoutAlign="space-between center"
    style="position: relative;"
  >
    <div fxLayoutAlign="start center" fxLayoutGap="16px" fxLayout="row ">
      @if (innerWidth > 720) {
        <img
        class="rounded-full h-16 w-16"
        src="/assets/personal/pfp.jpg"
        alt="Profile photo"
      />
        <a (click)="navigateTo('/', 'experiences')">Experience</a>
        <a (click)="navigateTo('/', 'projects')">Projects</a>
      } @else {
        <a
          class="text-4xl"
          nz-dropdown
          nzTrigger="click"
          [nzDropdownMenu]="menu"
          ><span nz-icon nzType="menu" nzTheme="outline"></span
        ></a>
      }
      <nz-dropdown-menu #menu
        ><ul nz-menu>
          <a nz-menu-item (click)="navigateTo('/')">Home</a>
          <a nz-menu-item (click)="navigateTo('/', 'experiences')"
            >Experience</a
          >
          <a nz-menu-item (click)="router.navigateByUrl('/#projects')"
            >Projects</a
          >
          <a nz-menu-item (click)="navigateTo('/about')">About Me</a>
        </ul></nz-dropdown-menu
      >
    </div>
    <div
      class="navbar-cta"
      [style.opacity]="ctaOpacity"
      [style.transform]="ctaTransform"
      [style.pointer-events]="ctaOpacity > 0.5 ? 'auto' : 'none'"
    >
      <a
        href="https://calendly.com/zachlegesse/30min"
        target="_blank"
        class="glass-reply-border text-body"
        style="font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; color: inherit;"
      >
        Call me
        <span nz-icon nzType="phone" nzTheme="outline"></span>
      </a>
    </div>

    <div fxLayout="row" fxLayoutGap="16px" fxLayoutAlign="end center">
      <a
        fxLayout="row"
        fxLayoutAlign="center center"
        (click)="downloadResume()"
        style="cursor: pointer; text-decoration: underline; font-size: 16px; gap: 6px;"
      >
        Resume
        <span nz-icon nzType="download" nzTheme="outline"></span>
      </a>
      <div fxLayout="row" fxLayoutGap="4px" fxLayoutAlign="center center">
        <a
          fxLayoutAlign="center center"
          href="https://github.com/zachale"
          class="nav-link"
          target="_blank"
        >
          <span class="text-4xl" nz-icon nzType="github" nzTheme="outline"></span>
        </a>
        <a
          fxLayout="row"
          fxLayoutAlign="center center"
          class="nav-link"
          href="https://linkedin.com/in/zach-legesse"
          target="_blank"
        >
          <span class="text-4xl" nz-icon nzType="linkedin" nzTheme="fill"></span>
        </a>
      </div>
      <!-- <div class="nav-link h-full">
        <div class="relative h-full">
          <a href="https://playimaginate.com/?source=zach" target="_blank"
            ><img
              style="max-width: 50px"
              width="100%"
              src="/assets/imaginate/imaginate-beaker-solo.png"
            />
          </a>
          <img
            class="absolute -bottom-2 -right-2 sparkle"
            width="24px"
            src="/assets/imaginate/sparkles.png"
          />
        </div>
      </div> -->
    </div>
  </div>
</div>
